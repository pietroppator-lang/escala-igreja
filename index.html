<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Escala - Verbo da Vida</title>
    <style>
        :root { --azul: #007bff; --preto: #0b0b0b; --cinza: #1a1a1a; --branco: #ffffff; --danger: #dc3545; }
        body { background-color: var(--preto); color: var(--branco); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* NAVEGAÇÃO */
        .nav { display: flex; gap: 8px; width: 100%; max-width: 500px; margin-bottom: 20px; }
        .nav button { flex: 1; padding: 12px; border-radius: 12px; border: none; background: #333; color: white; font-weight: bold; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .nav button.active { background: var(--azul); box-shadow: 0 4px 12px rgba(0,123,255,0.3); }

        /* CONTAINERS */
        .container { width: 100%; max-width: 500px; background-color: var(--cinza); padding: 25px; border-radius: 20px; border-left: 5px solid var(--azul); margin-bottom: 20px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--azul); margin-bottom: 20px; }
        
        input, textarea, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; box-sizing: border-box; font-size: 16px; }
        input, textarea { background-color: #252525; color: white; border: 1px solid #333; }
        
        .btn-principal { background-color: var(--azul); color: white; font-weight: bold; cursor: pointer; }
        .btn-danger { background-color: var(--danger); margin-top: 15px; color: white; font-weight: bold; cursor: pointer; }
        
        /* CARDS */
        .card { background: #222; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--azul); position: relative; }
        .btn-excluir-item { background: var(--danger); width: auto; padding: 6px 12px; font-size: 10px; position: absolute; top: 12px; right: 12px; margin: 0; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; }
        
        /* GRID CHECKBOX */
        .grid-check { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #111; padding: 15px; border-radius: 15px; }
        .check-item { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .check-item input { width: 20px; height: 20px; accent-color: var(--azul); }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="nav">
        <button id="btn-home" onclick="irPara('home')" class="active">Página Inicial</button>
        <button id="btn-membro" onclick="acessarArea('membro')">Disponibilidade</button>
        <button id="btn-adm" onclick="acessarArea('adm')">Painel ADM</button>
        <button style="background:#444" onclick="sair()">Sair</button>
    </div>

    <div id="pag-home" class="container">
        <h2>Escalas Publicadas</h2>
        <div id="lista-escalas">Carregando escalas...</div>
    </div>

    <div id="pag-login" class="container hidden">
        <h2 id="login-label">Acesso</h2>
        <input type="text" id="user" placeholder="Usuário" autocomplete="off">
        <input type="password" id="pass" placeholder="Senha" autocomplete="off">
        <button class="btn-principal" onclick="fazerLogin()">ACESSAR</button>
    </div>

    <div id="pag-membro" class="container hidden">
        <h2 id="saudacao">Olá!</h2>
        <input type="text" id="nome-membro" placeholder="Seu Nome Completo">
        <div class="grid-check">
            <label class="check-item"><input type="checkbox" value="Ministro"> Ministro</label>
            <label class="check-item"><input type="checkbox" value="Voz"> Voz</label>
            <label class="check-item"><input type="checkbox" value="Backing"> Backing</label>
            <label class="check-item"><input type="checkbox" value="Violão"> Violão</label>
            <label class="check-item"><input type="checkbox" value="Teclado"> Teclado</label>
            <label class="check-item"><input type="checkbox" value="Baixo"> Baixo</label>
            <label class="check-item"><input type="checkbox" value="Bateria"> Bateria</label>
            <label class="check-item"><input type="checkbox" value="Guitarra"> Guitarra</label>
        </div>
        <button class="btn-principal" onclick="enviarDisp()">ENVIAR DISPONIBILIDADE</button>
    </div>

    <div id="pag-adm" class="container hidden">
        <h2>Painel do Líder</h2>
        <input type="text" id="c-culto" placeholder="Nome do Culto">
        <input type="text" id="c-data" placeholder="Data">
        <textarea id="c-equipe" rows="4" placeholder="Equipe (Ex: Pedro - Voz)"></textarea>
        <button class="btn-principal" onclick="postarEscala()">PUBLICAR ESCALA</button>
        
        <hr style="border:0; border-top:1px solid #333; margin:25px 0;">
        
        <h3>Controle de Respostas</h3>
        <button class="btn-danger" id="limpar-tudo" style="display:none;" onclick="apagarTudoRespostas()">LIMPAR TODA A LISTA DE DISPONIBILIDADE</button>
        <div id="lista-adm-controle" style="margin-top:15px"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMc606NmVgdUXG8dDET3bIjfqD354fHlQ",
            authDomain: "escala-verbo-da-vida.firebaseapp.com",
            databaseURL: "https://escala-verbo-da-vida-default-rtdb.firebaseio.com",
            projectId: "escala-verbo-da-vida",
            storageBucket: "escala-verbo-da-vida.firebasestorage.app",
            messagingSenderId: "571256917336",
            appId: "1:571256917336:web:f3fc00d02d09ac49fd692d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let areaPretendida = '';

        window.irPara = (id) => {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('pag-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
        };

        window.acessarArea = (area) => {
            areaPretendida = area;
            const logado = sessionStorage.getItem('loginAtivo');
            if(logado === area || logado === 'adm') irPara(area);
            else { 
                document.getElementById('login-label').innerText = "Login " + (area === 'adm' ? "Líder" : "Músicos");
                irPara('login'); 
            }
        };

        window.fazerLogin = () => {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;
            if(u === 'pedroliveira' && p === 'admin123') { sessionStorage.setItem('loginAtivo', 'adm'); irPara(areaPretendida || 'adm'); }
            else if(u === 'membro' && p === 'verbo') { sessionStorage.setItem('loginAtivo', 'membro'); irPara('membro'); }
            else alert('Acesso Negado!');
        };

        window.sair = () => { sessionStorage.clear(); location.reload(); };

        window.enviarDisp = () => {
            const nome = document.getElementById('nome-membro').value;
            const funcs = Array.from(document.querySelectorAll('.grid-check input:checked')).map(i => i.value);
            if(!nome || funcs.length === 0) return alert('Informe nome e funções!');
            push(ref(db, 'respostas'), { nome, funcoes: funcs.join(' + ') }).then(() => {
                alert('Enviado!'); document.getElementById('saudacao').innerText = "Olá, " + nome + "!";
                document.getElementById('nome-membro').value = '';
                document.querySelectorAll('.grid-check input').forEach(c => c.checked = false);
            });
        };

        window.postarEscala = () => {
            push(ref(db, 'escalas_db'), {
                culto: document.getElementById('c-culto').value,
                data: document.getElementById('c-data').value,
                equipe: document.getElementById('c-equipe').value
            }).then(() => {
                alert('Escala Publicada!');
                document.getElementById('c-culto').value = '';
                document.getElementById('c-data').value = '';
                document.getElementById('c-equipe').value = '';
            });
        };

        window.excluirIndividual = (pasta, id) => {
            if(confirm('Apagar este item permanentemente?')) remove(ref(db, `${pasta}/${id}`));
        };

        window.apagarTudoRespostas = () => {
            if(confirm('AVISO: Isso vai limpar TODAS as respostas dos músicos. Confirmar?')) {
                set(ref(db, 'respostas'), null).then(() => alert('Lista de disponibilidades zerada!'));
            }
        };

        onValue(ref(db), (snap) => {
            const d = snap.val() || {};
            let hEsc = '', hAdm = '';
            
            // Renderiza Escalas na Home e no ADM
            for(let id in d.escalas_db) {
                const e = d.escalas_db[id];
                hEsc += `<div class="card"><strong>${e.culto}</strong><br><small>${e.data}</small><p>${e.equipe.replace(/\n/g, '<br>')}</p></div>`;
                hAdm += `<div class="card"><button class="btn-excluir-item" onclick="excluirIndividual('escalas_db','${id}')">APAGAR</button><strong>Escala: ${e.culto}</strong></div>`;
            }

            // Controle de Exibição do Botão "Limpar Tudo"
            const respostas = d.respostas || {};
            document.getElementById('limpar-tudo').style.display = Object.keys(respostas).length > 0 ? 'block' : 'none';

            // Renderiza Respostas de Disponibilidade no ADM
            for(let id in respostas) {
                const r = respostas[id];
                hAdm += `<div class="card"><button class="btn-excluir-item" onclick="excluirIndividual('respostas','${id}')">APAGAR</button><strong>Membro: ${r.nome}</strong><br>Funções: ${r.funcoes}</div>`;
            }

            document.getElementById('lista-escalas').innerHTML = hEsc || "Nenhuma escala publicada.";
            document.getElementById('lista-adm-controle').innerHTML = hAdm || "Nenhuma resposta de disponibilidade no momento.";
        });
    </script>
</body>
</html>
