<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Verbo da Vida</title>
    <style>
        :root { --azul: #007bff; --preto: #0b0b0b; --cinza: #1a1a1a; --branco: #ffffff; }
        body { background-color: var(--preto); color: var(--branco); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; background-color: var(--cinza); padding: 20px; border-radius: 15px; border-left: 4px solid var(--azul); box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; box-sizing: border-box; }
        h2, h3 { text-align: center; color: var(--azul); }
        input, select, button, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; }
        input, textarea { background-color: #252525; color: white; border: 1px solid #333; }
        button { background-color: var(--azul); color: white; font-weight: bold; cursor: pointer; }
        .nav { display: flex; gap: 5px; width: 100%; max-width: 500px; margin-bottom: 10px; }
        .nav button { font-size: 12px; background: #333; padding: 10px 2px; }
        .card { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 3px solid var(--azul); position: relative; }
        .btn-excluir { background: #dc3545; width: auto; padding: 5px 10px; font-size: 11px; float: right; margin: 0; }
        .grid-funcoes { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #111; padding: 15px; border-radius: 10px; margin: 10px 0; }
        .funcao-item { display: flex; align-items: center; gap: 10px; color: var(--azul); font-weight: bold; font-size: 14px; }
        .funcao-item input { width: 20px; height: 20px; margin: 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="nav">
        <button onclick="irPara('inicial')">ESCALAS</button>
        <button onclick="irPara('membro')">DISPONIBILIDADE</button>
        <button onclick="checarADM()">ADM</button>
        <button style="background:#666" onclick="sair()">SAIR</button>
    </div>

    <div id="pag-inicial" class="container">
        <h2>Escalas Publicadas</h2>
        <div id="lista-escalas">Carregando...</div>
    </div>

    <div id="pag-membro" class="container">
        <h2 id="saudacao-membro">Olá!</h2>
        <p>Em qual(is) função(ões) você poderá estar?</p>
        <input type="text" id="nome-disponibilidade" placeholder="Seu Nome (Ex: Pedro)">
        
        <div class="grid-funcoes">
            <label class="funcao-item"><input type="checkbox" value="Ministro"> Ministro</label>
            <label class="funcao-item"><input type="checkbox" value="Voz"> Voz</label>
            <label class="funcao-item"><input type="checkbox" value="Backing"> Backing</label>
            <label class="funcao-item"><input type="checkbox" value="Violão"> Violão</label>
            <label class="funcao-item"><input type="checkbox" value="Teclado"> Teclado</label>
            <label class="funcao-item"><input type="checkbox" value="Baixo"> Baixo</label>
            <label class="funcao-item"><input type="checkbox" value="Bateria"> Bateria</label>
            <label class="funcao-item"><input type="checkbox" value="Guitarra"> Guitarra</label>
        </div>
        
        <button onclick="salvarDisp()">Enviar Disponibilidade</button>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <div id="lista-respostas-membros"></div>
    </div>

    <div id="pag-login" class="container hidden">
        <h2>Acesso ADM</h2>
        <input type="password" id="senha-adm" placeholder="Digite a senha">
        <button onclick="logar()">Acessar</button>
    </div>

    <div id="pag-adm" class="container hidden">
        <h2>Painel ADM</h2>
        <input type="text" id="esc-culto" placeholder="Nome do Culto">
        <input type="text" id="esc-data" placeholder="Data">
        <textarea id="esc-equipe" placeholder="Equipe (Ex: Pedro - Voz, João - Baixo)"></textarea>
        <button onclick="publicarEscala()">Publicar Agora</button>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <div id="lista-gerenciamento"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMc606NmVgdUXG8dDET3bIjfqD354fHlQ",
            authDomain: "escala-verbo-da-vida.firebaseapp.com",
            databaseURL: "https://escala-verbo-da-vida-default-rtdb.firebaseio.com",
            projectId: "escala-verbo-da-vida",
            storageBucket: "escala-verbo-da-vida.firebasestorage.app",
            messagingSenderId: "571256917336",
            appId: "1:571256917336:web:f3fc00d02d09ac49fd692d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.irPara = (id) => {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('pag-' + id).classList.remove('hidden');
        };

        window.checarADM = () => {
            if(sessionStorage.getItem('logado')) irPara('adm');
            else irPara('login');
        };

        window.logar = () => {
            if(document.getElementById('senha-adm').value === '123') {
                sessionStorage.setItem('logado', 'true');
                irPara('adm');
            } else { alert('Senha incorreta!'); }
        };

        window.sair = () => {
            sessionStorage.clear();
            location.reload();
        };

        window.salvarDisp = () => {
            const nome = document.getElementById('nome-disponibilidade').value;
            const selecionados = Array.from(document.querySelectorAll('.funcao-item input:checked')).map(i => i.value);
            if(!nome || selecionados.length === 0) return alert('Preencha seu nome e funções!');

            push(ref(db, 'disponibilidade'), {
                nome: nome,
                funcoes: selecionados.join(' + ')
            }).then(() => { 
                alert('Enviado!'); 
                document.getElementById('saudacao-membro').innerText = "Olá, " + nome + "!";
                document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
            });
        };

        window.publicarEscala = () => {
            push(ref(db, 'escalas'), {
                culto: document.getElementById('esc-culto').value,
                data: document.getElementById('esc-data').value,
                equipe: document.getElementById('esc-equipe').value
            }).then(() => { alert('Escala publicada!'); location.reload(); });
        };

        window.deletarItem = (pasta, id) => {
            if(confirm('Apagar permanentemente?')) {
                remove(ref(db, pasta + '/' + id));
            }
        };

        onValue(ref(db), (snap) => {
            const dados = snap.val() || {};
            let hEsc = '', hDisp = '', hAdm = '<h3>Gerenciar Dados</h3>';

            for(let id in dados.escalas) {
                const e = dados.escalas[id];
                hEsc += `<div class="card"><strong>${e.culto}</strong><br><small>${e.data}</small><br><br>${e.equipe}</div>`;
                hAdm += `<div class="card"><button class="btn-excluir" onclick="deletarItem('escalas','${id}')">Excluir</button><strong>${e.culto}</strong></div>`;
            }

            for(let id in dados.disponibilidade) {
                const d = dados.disponibilidade[id];
                hDisp += `<div class="card"><strong>${d.nome}</strong>: ${d.funcoes}</div>`;
                hAdm += `<div class="card"><button class="btn-excluir" onclick="deletarItem('disponibilidade','${id}')">Limpar Resposta</button><strong>Disp: ${d.nome}</strong></div>`;
            }

            document.getElementById('lista-escalas').innerHTML = hEsc || 'Sem escalas.';
            document.getElementById('lista-respostas-membros').innerHTML = hDisp || 'Nenhuma resposta.';
            document.getElementById('lista-gerenciamento').innerHTML = hAdm;
        });

    </script>
</body>
</html>
