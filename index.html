<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Escala - Verbo da Vida</title>
    <style>
        :root {
            --azul: #007bff;
            --azul-hover: #0056b3;
            --preto: #0b0b0b;
            --cinza-escuro: #1a1a1a;
            --cinza-claro: #252525;
            --branco: #ffffff;
            --danger: #dc3545;
        }

        body {
            background-color: var(--preto);
            color: var(--branco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* NAVEGAÇÃO */
        .nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            padding: 20px 10px;
            position: sticky;
            top: 0;
            background: var(--preto);
            z-index: 1000;
        }

        .nav button {
            flex: 1;
            padding: 12px 5px;
            border: none;
            border-radius: 12px;
            background: var(--cinza-escuro);
            color: white;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .nav button.active {
            background: var(--azul);
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }

        /* CONTAINERS */
        .container {
            width: 95%;
            max-width: 500px;
            background-color: var(--cinza-escuro);
            padding: 25px;
            border-radius: 25px;
            border-left: 6px solid var(--azul);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            margin-bottom: 30px;
            box-sizing: border-box;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { text-align: center; color: var(--azul); margin-bottom: 25px; font-size: 24px; }

        input, textarea {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #333;
            background-color: var(--cinza-claro);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .btn-principal {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background-color: var(--azul);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-perigo {
            background-color: var(--danger);
            margin-top: 10px;
        }

        /* CARDS */
        .card {
            background: #222;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-left: 4px solid var(--azul);
            position: relative;
        }

        .btn-mini-excluir {
            background: var(--danger);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 10px;
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
        }

        /* GRID CHECKBOX */
        .grid-check {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: #111;
            padding: 15px;
            border-radius: 15px;
        }

        .check-item { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .check-item input { width: 18px; height: 18px; accent-color: var(--azul); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="nav">
        <button id="btn-home" onclick="irPara('home')" class="active">Página Inicial</button>
        <button id="btn-membro" onclick="acessarArea('membro')">Disponibilidade</button>
        <button id="btn-adm" onclick="acessarArea('adm')">Painel ADM</button>
        <button style="background:#444" onclick="sair()">Sair</button>
    </div>

    <div id="pag-home" class="container">
        <h2>Escalas Atuais</h2>
        <div id="lista-escalas">Carregando...</div>
    </div>

    <div id="pag-login" class="container hidden">
        <h2 id="tit-login">Acesso</h2>
        <input type="text" id="user" placeholder="Usuário" autocomplete="off">
        <input type="password" id="pass" placeholder="Senha" autocomplete="off">
        <button class="btn-principal" onclick="fazerLogin()">ENTRAR</button>
    </div>

    <div id="pag-membro" class="container hidden">
        <h2 id="saudacao">Olá!</h2>
        <input type="text" id="nome-membro" placeholder="Seu Nome Completo">
        <div class="grid-check">
            <label class="check-item"><input type="checkbox" value="Ministro"> Ministro</label>
            <label class="check-item"><input type="checkbox" value="Voz"> Voz</label>
            <label class="check-item"><input type="checkbox" value="Backing"> Backing</label>
            <label class="check-item"><input type="checkbox" value="Violão"> Violão</label>
            <label class="check-item"><input type="checkbox" value="Teclado"> Teclado</label>
            <label class="check-item"><input type="checkbox" value="Baixo"> Baixo</label>
            <label class="check-item"><input type="checkbox" value="Bateria"> Bateria</label>
            <label class="check-item"><input type="checkbox" value="Guitarra"> Guitarra</label>
        </div>
        <button class="btn-principal" style="margin-top:15px" onclick="enviarDisp()">ENVIAR DISPONIBILIDADE</button>
    </div>

    <div id="pag-adm" class="container hidden">
        <h2>Painel do Líder</h2>
        <input type="text" id="c-culto" placeholder="Culto">
        <input type="text" id="c-data" placeholder="Data">
        <textarea id="c-equipe" rows="4" placeholder="Equipe: Nome (Função)"></textarea>
        <button class="btn-principal" onclick="postar()">PUBLICAR ESCALA</button>
        
        <hr style="border:0; border-top:1px solid #333; margin:25px 0;">
        
        <h3>Disponibilidades Recebidas</h3>
        <button class="btn-principal btn-perigo" id="btn-limpar-tudo" onclick="limparTudoDisp()">LIMPAR TODAS AS RESPOSTAS</button>
        <div id="lista-adm-total" style="margin-top:20px"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMc606NmVgdUXG8dDET3bIjfqD354fHlQ",
            authDomain: "escala-verbo-da-vida.firebaseapp.com",
            databaseURL: "https://escala-verbo-da-vida-default-rtdb.firebaseio.com",
            projectId: "escala-verbo-da-vida",
            storageBucket: "escala-verbo-da-vida.firebasestorage.app",
            messagingSenderId: "571256917336",
            appId: "1:571256917336:web:f3fc00d02d09ac49fd692d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let destino = '';

        window.irPara = (id) => {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('pag-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            if(document.getElementById('btn-'+id)) document.getElementById('btn-'+id).classList.add('active');
        };

        window.acessarArea = (area) => {
            destino = area;
            if(sessionStorage.getItem('acesso') === 'adm' || (sessionStorage.getItem('acesso') === 'membro' && area === 'membro')) irPara(area);
            else { 
                document.getElementById('tit-login').innerText = "Acesso " + (area === 'adm' ? "Líder" : "Músicos");
                irPara('login'); 
            }
        };

        window.fazerLogin = () => {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;
            if(u === 'pedroliveira' && p === 'admin123') { sessionStorage.setItem('acesso', 'adm'); irPara(destino || 'adm'); }
            else if(u === 'membro' && p === 'verbo') { sessionStorage.setItem('acesso', 'membro'); irPara('membro'); }
            else alert('Dados incorretos!');
        };

        window.sair = () => { sessionStorage.clear(); location.reload(); };

        window.enviarDisp = () => {
            const nome = document.getElementById('nome-membro').value;
            const funcs = Array.from(document.querySelectorAll('.grid-check input:checked')).map(i => i.value);
            if(!nome || funcs.length === 0) return alert('Preencha nome e funções!');
            push(ref(db, 'respostas'), { nome, funcoes: funcs.join(' + ') }).then(() => {
                alert('Enviado!'); document.getElementById('saudacao').innerText = "Olá, " + nome + "!";
            });
        };

        window.postar = () => {
            push(ref(db, 'escalas_db'), {
                culto: document.getElementById('c-culto').value,
                data: document.getElementById('c-data').value,
                equipe: document.getElementById('c-equipe').value
            }).then(() => alert('Escala no ar!'));
        };

        // --- NOVAS FUNÇÕES DE EXCLUIR ---
        window.deletarItem = (pasta, id) => {
            if(confirm('Apagar este item?')) remove(ref(db, `${pasta}/${id}`));
        };

        window.limparTudoDisp = () => {
            if(confirm('Deseja apagar TODAS as disponibilidades recebidas? Esta ação não pode ser desfeita.')) {
                set(ref(db, 'respostas'), null).then(() => alert('Lista de disponibilidades limpa!'));
            }
        };

        onValue(ref(db), (snap) => {
            const d = snap.val() || {};
            let hEsc = '', hAdm = '';
            
            for(let id in d.escalas_db) {
                const e = d.escalas_db[id];
                hEsc += `<div class="card"><strong>${e.culto}</strong><small>${e.data}</small><p>${e.equipe.replace(/\n/g, '<br>')}</p></div>`;
                hAdm += `<div class="card"><button class="btn-mini-excluir" onclick="deletarItem('escalas_db','${id}')">APAGAR</button><strong>Escala: ${e.culto}</strong></div>`;
            }

            const temRespostas = d.respostas && Object.keys(d.respostas).length > 0;
            document.getElementById('btn-limpar-tudo').style.display = temRespostas ? 'block' : 'none';

            for(let id in d.respostas) {
                const r = d.respostas[id];
                hAdm += `<div class="card"><button class="btn-mini-excluir" onclick="deletarItem('respostas','${id}')">APAGAR</button><strong>DISP: ${r.nome}</strong><br>${r.funcoes}</div>`;
            }

            document.getElementById('lista-escalas').innerHTML = hEsc || "Nenhuma escala publicada.";
            document.getElementById('lista-adm-total').innerHTML = hAdm || "Nenhuma resposta recebida.";
        });
    </script>
</body>
</html>
