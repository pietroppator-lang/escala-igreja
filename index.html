<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Verbo da Vida</title>
    <style>
        :root { --azul: #007bff; --preto: #0b0b0b; --cinza: #1a1a1a; --branco: #ffffff; --hover: #0056b3; }
        body { background-color: var(--preto); color: var(--branco); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .nav { display: flex; gap: 8px; width: 100%; max-width: 500px; margin-bottom: 20px; position: sticky; top: 0; z-index: 10; background: var(--preto); padding: 10px 0; }
        .nav button { flex: 1; padding: 12px 5px; border-radius: 10px; border: none; background: var(--cinza); color: white; font-weight: bold; font-size: 11px; cursor: pointer; transition: 0.3s; border-bottom: 3px solid transparent; }
        .nav button.active { border-bottom: 3px solid var(--azul); background: #222; }

        .container { width: 100%; max-width: 500px; background-color: var(--cinza); padding: 25px; border-radius: 20px; border-left: 5px solid var(--azul); box-shadow: 0 15px 35px rgba(0,0,0,0.6); margin-bottom: 25px; box-sizing: border-box; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { text-align: center; color: var(--azul); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input, textarea { background-color: #252525; color: white; border: 1px solid #333; }
        input:focus { border-color: var(--azul); outline: none; background: #2a2a2a; }
        
        button { background-color: var(--azul); color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,123,255,0.3); }
        button:hover { background: var(--hover); transform: translateY(-2px); }
        
        .card { background: #222; padding: 18px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--azul); position: relative; transition: 0.3s; }
        .card:hover { background: #282828; }
        .card strong { color: var(--azul); font-size: 18px; }
        
        .btn-excluir { background: #dc3545; width: auto; padding: 6px 12px; font-size: 11px; position: absolute; top: 15px; right: 15px; margin: 0; box-shadow: none; }
        
        .grid-check { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .check-item { display: flex; align-items: center; gap: 10px; color: #ccc; font-size: 14px; cursor: pointer; }
        .check-item input { width: 20px; height: 20px; margin: 0; accent-color: var(--azul); }
        
        .hidden { display: none; }
        .status-msg { text-align: center; color: #888; font-style: italic; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="nav" id="menu-superior">
        <button id="btn-escalas" onclick="irPara('inicial')">ESCALAS</button>
        <button id="btn-disp" onclick="irPara('membro')">DISPONIBILIDADE</button>
        <button id="btn-adm" onclick="irPara('adm')">ADM</button>
        <button style="background:#444" onclick="sair()">SAIR</button>
    </div>

    <div id="pag-login" class="container">
        <h2>Acesso ao Sistema</h2>
        <input type="text" id="user" placeholder="Usuário" autocomplete="off">
        <input type="password" id="pass" placeholder="Senha" autocomplete="off">
        <button onclick="fazerLogin()">ENTRAR</button>
        <p class="status-msg">Use suas credenciais para acessar.</p>
    </div>

    <div id="pag-inicial" class="container hidden">
        <h2>Escalas Publicadas</h2>
        <div id="lista-escalas"></div>
    </div>

    <div id="pag-membro" class="container hidden">
        <h2 id="saudacao">Olá!</h2>
        <p style="text-align:center; color:#aaa">Informe sua disponibilidade abaixo:</p>
        <input type="text" id="nome-membro" placeholder="Seu Nome Completo">
        <div class="grid-check">
            <label class="check-item"><input type="checkbox" value="Ministro"> Ministro</label>
            <label class="check-item"><input type="checkbox" value="Voz"> Voz</label>
            <label class="check-item"><input type="checkbox" value="Backing"> Backing</label>
            <label class="check-item"><input type="checkbox" value="Violão"> Violão</label>
            <label class="check-item"><input type="checkbox" value="Teclado"> Teclado</label>
            <label class="check-item"><input type="checkbox" value="Baixo"> Baixo</label>
            <label class="check-item"><input type="checkbox" value="Bateria"> Bateria</label>
            <label class="check-item"><input type="checkbox" value="Guitarra"> Guitarra</label>
        </div>
        <button onclick="enviarDisp()">ENVIAR RESPOSTA</button>
        <div id="lista-membro-respostas" style="margin-top:20px"></div>
    </div>

    <div id="pag-adm" class="container hidden">
        <h2>Painel do Líder</h2>
        <input type="text" id="c-culto" placeholder="Nome do Culto">
        <input type="text" id="c-data" placeholder="Data e Horário">
        <textarea id="c-equipe" rows="4" placeholder="Equipe: Nome (Função)..."></textarea>
        <button onclick="postar()">PUBLICAR ESCALA</button>
        <hr style="border:0; border-top:1px solid #333; margin:25px 0;">
        <div id="lista-adm-controle"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMc606NmVgdUXG8dDET3bIjfqD354fHlQ",
            authDomain: "escala-verbo-da-vida.firebaseapp.com",
            databaseURL: "https://escala-verbo-da-vida-default-rtdb.firebaseio.com",
            projectId: "escala-verbo-da-vida",
            storageBucket: "escala-verbo-da-vida.firebasestorage.app",
            messagingSenderId: "571256917336",
            appId: "1:571256917336:web:f3fc00d02d09ac49fd692d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // NAVEGAÇÃO E LOGIN
        window.irPara = (id) => {
            const tipo = sessionStorage.getItem('tipo');
            if(!tipo) {
                document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
                document.getElementById('pag-login').classList.remove('hidden');
                return;
            }
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('pag-' + id).classList.remove('hidden');
            
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-' + (id === 'inicial' ? 'escalas' : id === 'membro' ? 'disp' : 'adm'));
            if(btn) btn.classList.add('active');
        };

        window.fazerLogin = () => {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;

            if(u === 'pedroliveira' && p === 'admin123') {
                sessionStorage.setItem('tipo', 'adm');
                irPara('adm');
            } else if(u === 'membro' && p === 'verbo') {
                sessionStorage.setItem('tipo', 'membro');
                irPara('membro');
            } else {
                alert('Usuário ou Senha incorretos!');
            }
        };

        window.sair = () => {
            sessionStorage.clear();
            location.reload();
        };

        // FUNÇÕES DO BANCO DE DADOS
        window.enviarDisp = () => {
            const nome = document.getElementById('nome-membro').value;
            const funcs = Array.from(document.querySelectorAll('.grid-check input:checked')).map(i => i.value);
            if(!nome || funcs.length === 0) return alert('Por favor, preencha seu nome e escolha as funções.');

            push(ref(db, 'respostas'), { nome, funcoes: funcs.join(' + '), dataEnvio: new Date().toLocaleString() })
            .then(() => {
                alert('Disponibilidade enviada!');
                document.getElementById('saudacao').innerText = "Olá, " + nome + "!";
                document.getElementById('nome-membro').value = "";
                document.querySelectorAll('.grid-check input').forEach(c => c.checked = false);
            });
        };

        window.postar = () => {
            const culto = document.getElementById('c-culto').value;
            const data = document.getElementById('c-data').value;
            const equipe = document.getElementById('c-equipe').value;
            if(!culto || !data) return alert('Preencha pelo menos o nome do culto e a data.');

            push(ref(db, 'escalas'), { culto, data, equipe })
            .then(() => {
                alert('Escala publicada com sucesso!');
                document.getElementById('c-culto').value = "";
                document.getElementById('c-data').value = "";
                document.getElementById('c-equipe').value = "";
            });
        };

        window.excluir = (pasta, id) => {
            if(confirm('Tem certeza que deseja apagar este item?')) {
                remove(ref(db, pasta + '/' + id));
            }
        };

        // RENDERIZAÇÃO EM TEMPO REAL
        onValue(ref(db), (snap) => {
            const d = snap.val() || {};
            let hEsc = '', hMembro = '', hAdm = '<h3>Gerenciamento Geral</h3>';

            for(let id in d.escalas) {
                const item = d.escalas[id];
                const card = `<div class="card"><strong>${item.culto}</strong><br><small>${item.data}</small><br><br>${item.equipe.replace(/\n/g, '<br>')}</div>`;
                hEsc += card;
                hAdm += `<div class="card"><button class="btn-excluir" onclick="excluir('escalas','${id}')">EXCLUIR</button><strong>${item.culto}</strong><br><small>${item.data}</small></div>`;
            }

            for(let id in d.respostas) {
                const item = d.respostas[id];
                hMembro += `<div class="card"><strong>${item.nome}</strong><br>Funções: ${item.funcoes}</div>`;
                hAdm += `<div class="card"><button class="btn-excluir" onclick="excluir('respostas','${id}')">LIMPAR</button><strong>DISP: ${item.nome}</strong><br>${item.funcoes}</div>`;
            }

            document.getElementById('lista-escalas').innerHTML = hEsc || '<p class="status-msg">Nenhuma escala publicada.</p>';
            document.getElementById('lista-membro-respostas').innerHTML = hMembro;
            document.getElementById('lista-adm-controle').innerHTML = hAdm;
        });

        // Inicia na tela de login
        irPara('login');
    </script>
</body>
</html>
