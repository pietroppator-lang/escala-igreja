<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Escala - Verbo da Vida</title>
    <style>
        :root {
            --azul: #007bff;
            --azul-hover: #0056b3;
            --preto: #0b0b0b;
            --cinza-escuro: #1a1a1a;
            --cinza-claro: #252525;
            --branco: #ffffff;
            --danger: #dc3545;
        }

        body {
            background-color: var(--preto);
            color: var(--branco);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* NAVEGAÇÃO */
        .nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            padding: 20px 10px;
            position: sticky;
            top: 0;
            background: var(--preto);
            z-index: 1000;
        }

        .nav button {
            flex: 1;
            padding: 12px 5px;
            border: none;
            border-radius: 12px;
            background: var(--cinza-escuro);
            color: white;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .nav button.active {
            background: var(--azul);
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }

        /* CONTAINERS */
        .container {
            width: 90%;
            max-width: 500px;
            background-color: var(--cinza-escuro);
            padding: 30px;
            border-radius: 25px;
            border-left: 6px solid var(--azul);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            margin-bottom: 30px;
            box-sizing: border-box;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            text-align: center;
            color: var(--azul);
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 700;
        }

        /* FORMULÁRIOS */
        input, textarea, select {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #333;
            background-color: var(--cinza-claro);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--azul);
            outline: none;
            background: #2a2a2a;
        }

        button.btn-principal {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border-radius: 12px;
            border: none;
            background-color: var(--azul);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button.btn-principal:hover {
            background-color: var(--azul-hover);
            transform: translateY(-2px);
        }

        /* CARDS DE ESCALA */
        .card {
            background: linear-gradient(145deg, #222, #181818);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 20px;
            border-left: 4px solid var(--azul);
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card strong {
            display: block;
            font-size: 20px;
            color: var(--azul);
            margin-bottom: 5px;
        }

        .card small {
            color: #aaa;
            font-size: 14px;
        }

        .card p {
            margin-top: 15px;
            line-height: 1.6;
            color: #eee;
        }

        /* BOTÃO EXCLUIR */
        .btn-excluir {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* GRID DE CHECKBOX */
        .grid-check {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: #111;
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .check-item input {
            width: 20px;
            height: 20px;
            margin: 0;
            cursor: pointer;
            accent-color: var(--azul);
        }

        .hidden { display: none; }

        .footer {
            margin: 40px 0;
            color: #555;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="nav">
        <button id="btn-nav-home" onclick="irPara('home')" class="active">Início</button>
        <button id="btn-nav-membro" onclick="acessarArea('membro')">Disponibilidade</button>
        <button id="btn-nav-adm" onclick="acessarArea('adm')">Painel ADM</button>
        <button style="background:#444" onclick="sair()">Sair</button>
    </div>

    <div id="pag-home" class="container">
        <h2>Escalas de Culto</h2>
        <div id="lista-escalas">Carregando escalas...</div>
    </div>

    <div id="pag-login" class="container hidden">
        <h2 id="login-titulo">Entrar</h2>
        <input type="text" id="user" placeholder="Usuário" autocomplete="off">
        <input type="password" id="pass" placeholder="Senha" autocomplete="off">
        <button class="btn-principal" onclick="fazerLogin()">ACESSAR</button>
    </div>

    <div id="pag-membro" class="container hidden">
        <h2 id="boas-vindas">Olá!</h2>
        <p style="text-align:center; color:#888">Informe sua disponibilidade abaixo:</p>
        <input type="text" id="nome-membro" placeholder="Seu Nome Completo">
        
        <div class="grid-check">
            <label class="check-item"><input type="checkbox" value="Ministro"> Ministro</label>
            <label class="check-item"><input type="checkbox" value="Voz"> Voz</label>
            <label class="check-item"><input type="checkbox" value="Backing"> Backing</label>
            <label class="check-item"><input type="checkbox" value="Violão"> Violão</label>
            <label class="check-item"><input type="checkbox" value="Teclado"> Teclado</label>
            <label class="check-item"><input type="checkbox" value="Baixo"> Baixo</label>
            <label class="check-item"><input type="checkbox" value="Bateria"> Bateria</label>
            <label class="check-item"><input type="checkbox" value="Guitarra"> Guitarra</label>
        </div>
        
        <button class="btn-principal" onclick="enviarDisponibilidade()">ENVIAR RESPOSTA</button>
        <div id="minhas-respostas-membro" style="margin-top:20px"></div>
    </div>

    <div id="pag-adm" class="container hidden">
        <h2>Gerenciar Escalas</h2>
        <input type="text" id="c-culto" placeholder="Nome do Culto">
        <input type="text" id="c-data" placeholder="Data (Ex: Domingo - 19h)">
        <textarea id="c-equipe" rows="5" placeholder="Equipe (Ex: Pedro - Voz, João - Baixo)"></textarea>
        <button class="btn-principal" onclick="publicarEscala()">PUBLICAR ESCALA</button>
        
        <hr style="border:0; border-top:1px solid #333; margin:30px 0;">
        <h3>Escalas e Pedidos</h3>
        <div id="lista-adm-controle"></div>
    </div>

    <div class="footer">Verbo da Vida - Sistema de Escala</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMc606NmVgdUXG8dDET3bIjfqD354fHlQ",
            authDomain: "escala-verbo-da-vida.firebaseapp.com",
            databaseURL: "https://escala-verbo-da-vida-default-rtdb.firebaseio.com",
            projectId: "escala-verbo-da-vida",
            storageBucket: "escala-verbo-da-vida.firebasestorage.app",
            messagingSenderId: "571256917336",
            appId: "1:571256917336:web:f3fc00d02d09ac49fd692d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let areaDestino = '';

        window.irPara = (id) => {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('pag-' + id).classList.remove('hidden');
            
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-nav-' + (id === 'home' ? 'home' : id === 'membro' ? 'membro' : 'adm'));
            if(btn) btn.classList.add('active');
        };

        window.acessarArea = (area) => {
            areaDestino = area;
            const logado = sessionStorage.getItem('tipoAcesso');
            if(logado === area || logado === 'adm') {
                irPara(area);
            } else {
                document.getElementById('login-titulo').innerText = "Login " + (area === 'adm' ? "Líder" : "Músicos");
                irPara('login');
            }
        };

        window.fazerLogin = () => {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;

            if(u === 'pedroliveira' && p === 'admin123') {
                sessionStorage.setItem('tipoAcesso', 'adm');
                irPara(areaDestino || 'adm');
            } else if(u === 'membro' && p === 'verbo') {
                sessionStorage.setItem('tipoAcesso', 'membro');
                irPara('membro');
            } else {
                alert('Acesso negado. Verifique usuário e senha.');
            }
        };

        window.sair = () => {
            sessionStorage.clear();
            location.reload();
        };

        window.enviarDisponibilidade = () => {
            const nome = document.getElementById('nome-membro').value;
            const funcs = Array.from(document.querySelectorAll('.grid-check input:checked')).map(i => i.value);
            
            if(!nome || funcs.length === 0) return alert('Preencha seu nome e marque as funções.');

            push(ref(db, 'disponibilidade'), {
                nome: nome,
                funcoes: funcs.join(' + '),
                data: new Date().toLocaleDateString()
            }).then(() => {
                alert('Disponibilidade enviada com sucesso!');
                document.getElementById('boas-vindas').innerText = "Olá, " + nome + "!";
                document.getElementById('nome-membro').value = "";
                document.querySelectorAll('.grid-check input').forEach(c => c.checked = false);
            });
        };

        window.publicarEscala = () => {
            const culto = document.getElementById('c-culto').value;
            const data = document.getElementById('c-data').value;
            const equipe = document.getElementById('c-equipe').value;

            if(!culto || !data) return alert('Preencha os campos obrigatórios.');

            push(ref(db, 'escalas_db'), { culto, data, equipe }).then(() => {
                alert('Escala publicada!');
                document.getElementById('c-culto').value = "";
                document.getElementById('c-data').value = "";
                document.getElementById('c-equipe').value = "";
            });
        };

        window.deletar = (caminho, id) => {
            if(confirm('Deseja realmente apagar este item?')) {
                remove(ref(db, caminho + '/' + id));
            }
        };

        // ESCUTA O BANCO DE DADOS EM TEMPO REAL
        onValue(ref(db), (snapshot) => {
            const data = snapshot.val() || {};
            let htmlEscalas = '', htmlMembro = '', htmlAdm = '<h4>Controle de Escalas e Pedidos</h4>';

            // Listar Escalas
            for(let id in data.escalas_db) {
                const e = data.escalas_db[id];
                const cardHtml = `<div class="card"><strong>${e.culto}</strong><small>${e.data}</small><p>${e.equipe.replace(/\n/g, '<br>')}</p></div>`;
                htmlEscalas += cardHtml;
                htmlAdm += `<div class="card"><button class="btn-excluir" onclick="deletar('escalas_db','${id}')">EXCLUIR</button><strong>${e.culto}</strong><small>${e.data}</small></div>`;
            }

            // Listar Disponibilidades
            for(let id in data.disponibilidade) {
                const d = data.disponibilidade[id];
                htmlMembro += `<div class="card"><strong>${d.nome}</strong>Funções: ${d.funcoes}</div>`;
                htmlAdm += `<div class="card"><button class="btn-excluir" onclick="deletar('disponibilidade','${id}')">LIMPAR</button><strong>PEDIDO: ${d.nome}</strong><br>${d.funcoes}</div>`;
            }

            document.getElementById('lista-escalas').innerHTML = htmlEscalas || "Nenhuma escala ativa.";
            document.getElementById('minhas-respostas-membro').innerHTML = htmlMembro;
            document.getElementById('lista-adm-controle').innerHTML = htmlAdm;
        });

    </script>
</body>
</html>
