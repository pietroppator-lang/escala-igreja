<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Verbo da Vida</title>
    <style>
        :root { --azul: #007bff; --preto: #0b0b0b; --cinza: #1a1a1a; --branco: #ffffff; }
        body { background-color: var(--preto); color: var(--branco); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .nav { display: flex; gap: 5px; width: 100%; max-width: 500px; margin-bottom: 15px; }
        .nav button { flex: 1; padding: 12px 2px; border-radius: 8px; border: none; background: #333; color: white; font-weight: bold; font-size: 10px; cursor: pointer; }
        .nav button.active { background: var(--azul); }

        .container { width: 100%; max-width: 500px; background-color: var(--cinza); padding: 20px; border-radius: 15px; border-left: 5px solid var(--azul); box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; box-sizing: border-box; }
        h2 { text-align: center; color: var(--azul); margin-top: 0; }
        
        input, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; }
        input, textarea { background-color: #252525; color: white; border: 1px solid #333; }
        button { background-color: var(--azul); color: white; font-weight: bold; cursor: pointer; }
        
        .card { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 3px solid var(--azul); position: relative; }
        .btn-excluir { background: #dc3545; width: auto; padding: 5px 10px; font-size: 11px; position: absolute; top: 10px; right: 10px; margin: 0; }
        
        .grid-check { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #111; padding: 15px; border-radius: 10px; margin: 10px 0; }
        .check-item { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 14px; }
        .check-item input { width: 18px; height: 18px; margin: 0; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="nav">
        <button id="btn-home" onclick="irPara('home')" class="active">PÁGINA INICIAL</button>
        <button id="btn-membro" onclick="acessarArea('membro')">DISPONIBILIDADE</button>
        <button id="btn-adm" onclick="acessarArea('adm')">PAINEL ADM</button>
        <button style="background:#555" onclick="sair()">SAIR</button>
    </div>

    <div id="pag-home" class="container">
        <h2>Escalas Publicadas</h2>
        <div id="lista-escalas">Carregando escalas...</div>
    </div>

    <div id="pag-login" class="container hidden">
        <h2 id="titulo-login">Acesso</h2>
        <input type="text" id="user" placeholder="Usuário" autocomplete="off">
        <input type="password" id="pass" placeholder="Senha" autocomplete="off">
        <button onclick="fazerLogin()">ENTRAR</button>
    </div>

    <div id="pag-membro" class="container hidden">
        <h2 id="saudacao">Olá!</h2>
        <p style="text-align:center; font-size:14px;">Marque sua disponibilidade:</p>
        <input type="text" id="nome-membro" placeholder="Seu Nome Completo">
        <div class="grid-check">
            <label class="check-item"><input type="checkbox" value="Ministro"> Ministro</label>
            <label class="check-item"><input type="checkbox" value="Voz"> Voz</label>
            <label class="check-item"><input type="checkbox" value="Backing"> Backing</label>
            <label class="check-item"><input type="checkbox" value="Violão"> Violão</label>
            <label class="check-item"><input type="checkbox" value="Teclado"> Teclado</label>
            <label class="check-item"><input type="checkbox" value="Baixo"> Baixo</label>
            <label class="check-item"><input type="checkbox" value="Bateria"> Bateria</label>
            <label class="check-item"><input type="checkbox" value="Guitarra"> Guitarra</label>
        </div>
        <button onclick="enviarDisp()">ENVIAR RESPOSTA</button>
        <div id="minhas-respostas" style="margin-top:20px;"></div>
    </div>

    <div id="pag-adm" class="container hidden">
        <h2>Painel do Líder</h2>
        <input type="text" id="c-culto" placeholder="Nome do Culto">
        <input type="text" id="c-data" placeholder="Data">
        <textarea id="c-equipe" placeholder="Equipe (Nome - Função)"></textarea>
        <button onclick="postar()">PUBLICAR ESCALA</button>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <div id="lista-adm-total"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMc606NmVgdUXG8dDET3bIjfqD354fHlQ",
            authDomain: "escala-verbo-da-vida.firebaseapp.com",
            databaseURL: "https://escala-verbo-da-vida-default-rtdb.firebaseio.com",
            projectId: "escala-verbo-da-vida",
            storageBucket: "escala-verbo-da-vida.firebasestorage.app",
            messagingSenderId: "571256917336",
            appId: "1:571256917336:web:f3fc00d02d09ac49fd692d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let areaPretendida = '';

        window.irPara = (id) => {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('pag-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            if(id === 'home') document.getElementById('btn-home').classList.add('active');
        };

        window.acessarArea = (area) => {
            areaPretendida = area;
            const logado = sessionStorage.getItem('tipo');
            if(logado === area || logado === 'adm') irPara(area);
            else {
                document.getElementById('titulo-login').innerText = "Login " + (area === 'adm' ? "ADM" : "Músicos");
                irPara('login');
            }
        };

        window.fazerLogin = () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if(u === 'pedroliveira' && p === 'admin123') {
                sessionStorage.setItem('tipo', 'adm');
                irPara(areaPretendida || 'adm');
            } else if(u === 'membro' && p === 'verbo') {
                sessionStorage.setItem('tipo', 'membro');
                irPara('membro');
            } else { alert('Dados incorretos!'); }
        };

        window.sair = () => { sessionStorage.clear(); location.reload(); };

        window.enviarDisp = () => {
            const nome = document.getElementById('nome-membro').value;
            const funcs = Array.from(document.querySelectorAll('.grid-check input:checked')).map(i => i.value);
            if(!nome || funcs.length === 0) return alert('Preencha seu nome e funções!');
            push(ref(db, 'respostas'), { nome, funcoes: funcs.join(' + ') }).then(() => {
                alert('Enviado!'); document.getElementById('saudacao').innerText = "Olá, " + nome + "!";
            });
        };

        window.postar = () => {
            push(ref(db, 'escalas'), {
                culto: document.getElementById('c-culto').value,
                data: document.getElementById('c-data').value,
                equipe: document.getElementById('c-equipe').value
            }).then(() => alert('Escala publicada!'));
        };

        window.excluir = (pasta, id) => {
            if(confirm('Apagar permanentemente?')) remove(ref(db, pasta + '/' + id));
        };

        onValue(ref(db), (snap) => {
            const d = snap.val() || {};
            let hEsc = '', hMembro = '', hAdm = '<h3>Gerenciamento</h3>';
            for(let id in d.escalas) {
                hEsc += `<div class="card"><strong>${d.escalas[id].culto}</strong><br>${d.escalas[id].data}<br><br>${d.escalas[id].equipe}</div>`;
                hAdm += `<div class="card"><button class="btn-excluir" onclick="excluir('escalas','${id}')">X</button><strong>${d.escalas[id].culto}</strong></div>`;
            }
            for(let id in d.respostas) {
                hMembro += `<div class="card"><strong>${d.respostas[id].nome}</strong>: ${d.respostas[id].funcoes}</div>`;
                hAdm += `<div class="card"><button class="btn-excluir" onclick="excluir('respostas','${id}')">Limpar</button>Disp: ${d.respostas[id].nome}</div>`;
            }
            document.getElementById('lista-escalas').innerHTML = hEsc || "Nenhuma escala.";
            document.getElementById('minhas-respostas').innerHTML = hMembro;
            document.getElementById('lista-adm-total').innerHTML = hAdm;
        });
    </script>
</body>
</html>
