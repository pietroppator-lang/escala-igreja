<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala - Verbo da Vida</title>
    <style>
        :root { --azul: #007bff; --preto: #0b0b0b; --cinza: #1a1a1a; --branco: #ffffff; }
        body { background-color: var(--preto); color: var(--branco); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; background-color: var(--cinza); padding: 20px; border-radius: 15px; border-left: 4px solid var(--azul); box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 10px; box-sizing: border-box; }
        h2 { text-align: center; color: var(--azul); margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        input { background-color: #252525; color: white; border: 1px solid #333; }
        button { background-color: var(--azul); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-excluir { background: #dc3545; width: auto; padding: 5px 10px; font-size: 11px; float: right; }
        .card { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 3px solid var(--azul); overflow: hidden; }
        .hidden { display: none; }
        .nav { display: flex; gap: 5px; width: 100%; max-width: 500px; }
        .nav button { font-size: 12px; padding: 10px 5px; }
    </style>
</head>
<body>

    <div class="nav">
        <button onclick="irPara('inicial')">Início</button>
        <button onclick="verificarLogin()">Painel ADM</button>
        <button style="background:#444" onclick="sair()">Sair/Voltar</button>
    </div>

    <div id="pag-inicial" class="container">
        <h2>Escalas Publicadas</h2>
        <div id="lista-geral">Carregando...</div>
    </div>

    <div id="pag-login" class="container hidden">
        <h2>Acesso ADM</h2>
        <input type="password" id="senha" placeholder="Senha de acesso">
        <button onclick="logar()">Entrar</button>
    </div>

    <div id="pag-adm" class="container hidden">
        <h2>Nova Escala</h2>
        <input type="text" id="nome-culto" placeholder="Ex: Culto da Família">
        <input type="text" id="data-culto" placeholder="Ex: Domingo - 19h">
        <input type="text" id="equipe" placeholder="Ex: Pedro (Voz), João (Violão)">
        <button onclick="salvar()">Publicar Agora</button>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <h3>Escalas Ativas</h3>
        <div id="lista-adm"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMc606NmVgdUXG8dDET3bIjfqD354fHlQ",
            authDomain: "escala-verbo-da-vida.firebaseapp.com",
            databaseURL: "https://escala-verbo-da-vida-default-rtdb.firebaseio.com",
            projectId: "escala-verbo-da-vida",
            storageBucket: "escala-verbo-da-vida.firebasestorage.app",
            messagingSenderId: "571256917336",
            appId: "1:571256917336:web:f3fc00d02d09ac49fd692d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // NAVEGAÇÃO
        window.irPara = (id) => {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('pag-' + id).classList.remove('hidden');
        };

        window.verificarLogin = () => {
            if(sessionStorage.getItem('adm')) irPara('adm');
            else irPara('login');
        };

        window.logar = () => {
            if(document.getElementById('senha').value === '123') {
                sessionStorage.setItem('adm', 'true');
                irPara('adm');
            } else { alert('Senha incorreta!'); }
        };

        window.sair = () => {
            sessionStorage.clear();
            location.reload();
        };

        // SALVAR
        window.salvar = () => {
            const r = ref(db, 'escalas');
            push(r, {
                culto: document.getElementById('nome-culto').value,
                data: document.getElementById('data-culto').value,
                equipe: document.getElementById('equipe').value
            }).then(() => {
                alert('Escala publicada!');
                document.querySelectorAll('input').forEach(i => i.value = '');
            });
        };

        // EXCLUIR
        window.deletar = (id) => {
            if(confirm('Excluir esta escala?')) {
                remove(ref(db, 'escalas/' + id));
            }
        };

        // MOSTRAR DADOS
        onValue(ref(db, 'escalas'), (snap) => {
            const dados = snap.val();
            let htmlGeral = '';
            let htmlAdm = '';

            for(let id in dados) {
                const e = dados[id];
                htmlGeral += `<div class="card"><strong>${e.culto}</strong><br><small>${e.data}</small><br><br>${e.equipe}</div>`;
                htmlAdm += `<div class="card"><button class="btn-excluir" onclick="deletar('${id}')">Excluir</button><strong>${e.culto}</strong><br>${e.data}</div>`;
            }

            document.getElementById('lista-geral').innerHTML = htmlGeral || 'Nenhuma escala.';
            document.getElementById('lista-adm').innerHTML = htmlAdm || 'Nenhuma escala.';
        });
    </script>
</body>
</html>
